<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 AI 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #e8629a;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --user-bubble: #1e1a3a;
    --ai-bubble: #161a26;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 780px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,15,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(124,106,247,0.4);
  }

  .header h1 {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .header h1 span {
    color: var(--accent);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  /* API Key Setup */
  .api-setup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setup-icon {
    font-size: 40px;
    text-align: center;
  }

  .setup-card h2 {
    font-size: 20px;
    font-weight: 400;
    text-align: center;
    color: var(--text);
  }

  .setup-card p {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  .setup-card a {
    color: var(--accent);
    text-decoration: none;
  }

  .setup-card a:hover {
    text-decoration: underline;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .api-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .api-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.1);
  }

  .setup-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    color: white;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
  }

  .setup-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .setup-btn:active { transform: translateY(0); }

  /* Persona selector */
  .persona-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .persona-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-family: 'Gowun Dodum', sans-serif;
  }

  .persona-chip:hover, .persona-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.1);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .welcome-logo {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px rgba(124,106,247,0.3);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 400;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 400px;
  }

  .suggestion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-top: 8px;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,106,247,0.06);
    transform: translateY(-2px);
  }

  .suggestion-btn .emoji {
    display: block;
    font-size: 18px;
    margin-bottom: 6px;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeInUp 0.3s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(124,106,247,0.3);
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,247,0.2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(13,13,15,0.9);
    backdrop-filter: blur(12px);
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .tool-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Gowun Dodum', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tool-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.08);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.5;
  }

  .chat-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
  }

  .chat-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(124,106,247,0.3);
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: white; }

  .hidden { display: none !important; }

  /* Error */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f87171;
    margin-top: 8px;
  }

  .char-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .suggestion-grid { grid-template-columns: 1fr; }
    .bubble { max-width: 88%; }
    .setup-card { padding: 24px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">✦</div>
      <h1>나만의 <span>AI 비서</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-dot" id="statusDot" style="display:none"></div>
      <span id="statusText" style="font-size:12px;color:var(--text-muted);display:none">연결됨</span>
      <button id="changeKeyBtn" class="tool-btn hidden" onclick="resetKey()" style="font-size:11px;">🔑 키 변경</button>
    </div>
  </div>

  <!-- API Setup Screen -->
  <div class="api-setup" id="setupScreen">
    <div class="setup-card">
      <div class="setup-icon">🔐</div>
      <h2>Claude API 키 입력</h2>
      <p>
        Anthropic의 Claude AI를 사용하려면 API 키가 필요해요.<br>
        <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>에서 무료로 발급받을 수 있어요.
      </p>

      <div class="input-group">
        <label>페르소나 선택</label>
        <div class="persona-row" id="personaRow">
          <button class="persona-chip active" data-persona="assistant" onclick="selectPersona(this)">🤝 범용 비서</button>
          <button class="persona-chip" data-persona="scheduler" onclick="selectPersona(this)">📅 일정 관리</button>
          <button class="persona-chip" data-persona="writer" onclick="selectPersona(this)">✍️ 문서 작성</button>
          <button class="persona-chip" data-persona="researcher" onclick="selectPersona(this)">🔍 정보 검색</button>
        </div>
      </div>

      <div class="input-group">
        <label>API Key</label>
        <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-api03-..." />
      </div>

      <button class="setup-btn" onclick="startChat()">시작하기 →</button>
      <div id="setupError" class="error-msg hidden"></div>

      <p style="font-size:12px;">💡 API 키는 브라우저 메모리에만 저장되며 서버로 전송되지 않아요.</p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div class="chat-area hidden" id="chatArea"></div>

  <!-- Input Area -->
  <div class="input-area hidden" id="inputArea">
    <div class="toolbar">
      <button class="tool-btn" onclick="insertTemplate('오늘 할일 목록을 정리해줘: ')">📋 할일 정리</button>
      <button class="tool-btn" onclick="insertTemplate('다음 내용을 한국어로 요약해줘:\n\n')">📄 문서 요약</button>
      <button class="tool-btn" onclick="insertTemplate('다음 주제에 대해 자세히 설명해줘: ')">🔍 정보 검색</button>
      <button class="tool-btn" onclick="insertTemplate('다음 내용으로 이메일을 작성해줘:\n\n')">✉️ 이메일 작성</button>
    </div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="무엇이든 물어보세요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="char-hint" id="charHint">Enter로 전송 · Shift+Enter 줄바꿈</div>
  </div>
</div>

<script>
  let apiKey = '';
  let conversationHistory = [];
  let selectedPersona = 'assistant';
  let isLoading = false;

  const PERSONAS = {
    assistant: {
      name: '범용 AI 비서',
      emoji: '🤝',
      system: `당신은 친절하고 유능한 개인 AI 비서입니다. 한국어로 자연스럽게 대화하며 사용자의 모든 요청을 도와줍니다. 
일정 관리, 문서 작성, 정보 검색, 아이디어 제안 등 다양한 작업을 도와드립니다. 
답변은 명확하고 실용적으로 작성하되, 필요시 구조화된 형태(번호 목록, 표 등)로 정리해드립니다.`,
      greeting: '안녕하세요! 저는 당신의 개인 AI 비서예요. 무엇이든 도와드릴게요 ✨',
      suggestions: [
        { emoji: '📋', text: '오늘 할 일 목록\n정리해줘' },
        { emoji: '✉️', text: '업무 이메일\n작성 도와줘' },
        { emoji: '📊', text: '아이디어 브레인\n스토밍 해줘' },
        { emoji: '🌐', text: '영어 문장\n한국어로 번역해줘' }
      ]
    },
    scheduler: {
      name: '일정 관리 비서',
      emoji: '📅',
      system: `당신은 전문 일정 관리 AI 비서입니다. 한국어로 대화하며 사용자의 일정, 할일, 우선순위 관리를 도와줍니다.
할일 목록 작성, 일정 계획, 시간 관리 팁, 우선순위 설정 등을 전문적으로 도와드립니다.
답변은 체계적이고 실행 가능한 형태로 작성합니다.`,
      greeting: '안녕하세요! 일정 관리 비서예요. 오늘 할 일이나 일정을 말씀해주세요 📅',
      suggestions: [
        { emoji: '🗓️', text: '이번 주 일정\n계획 세워줘' },
        { emoji: '⏰', text: '시간 관리\n팁 알려줘' },
        { emoji: '✅', text: '할일 우선순위\n정하는 법' },
        { emoji: '🎯', text: '목표 달성\n플랜 만들어줘' }
      ]
    },
    writer: {
      name: '문서 작성 비서',
      emoji: '✍️',
      system: `당신은 전문 문서 작성 AI 비서입니다. 한국어로 대화하며 각종 문서 작성을 도와줍니다.
이메일, 보고서, 기획서, SNS 게시물, 요약문 등 다양한 형태의 글쓰기를 도와드립니다.
문체는 요청에 맞게 조절하며, 명확하고 설득력 있는 글을 작성합니다.`,
      greeting: '안녕하세요! 문서 작성 비서예요. 어떤 글을 써드릴까요? ✍️',
      suggestions: [
        { emoji: '📧', text: '정중한 업무\n이메일 작성' },
        { emoji: '📝', text: '회의록 정리\n도와줘' },
        { emoji: '📣', text: 'SNS 게시물\n작성해줘' },
        { emoji: '📄', text: '텍스트 요약\n해줘' }
      ]
    },
    researcher: {
      name: '정보 검색 비서',
      emoji: '🔍',
      system: `당신은 전문 정보 분석 AI 비서입니다. 한국어로 대화하며 다양한 주제에 대한 정보와 분석을 제공합니다.
복잡한 개념 설명, 비교 분석, 장단점 정리, 트렌드 분석 등을 도와드립니다.
정보는 객관적으로 정리하고 출처와 한계를 명시합니다.`,
      greeting: '안녕하세요! 정보 검색 비서예요. 궁금한 것을 뭐든 물어보세요 🔍',
      suggestions: [
        { emoji: '💡', text: '최신 AI 트렌드\n알려줘' },
        { emoji: '⚖️', text: 'A/B 비교 분석\n해줘' },
        { emoji: '📈', text: '마케팅 전략\n설명해줘' },
        { emoji: '🧠', text: '어려운 개념\n쉽게 설명해줘' }
      ]
    }
  };

  function selectPersona(el) {
    document.querySelectorAll('.persona-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedPersona = el.dataset.persona;
  }

  function startChat() {
    const key = document.getElementById('apiKeyInput').value.trim();
    const errEl = document.getElementById('setupError');

    if (!key.startsWith('sk-ant')) {
      errEl.textContent = '올바른 API 키 형식이 아닙니다. sk-ant-로 시작해야 해요.';
      errEl.classList.remove('hidden');
      return;
    }

    apiKey = key;
    errEl.classList.add('hidden');

    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('chatArea').classList.remove('hidden');
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('statusDot').style.display = 'block';
    document.getElementById('statusText').style.display = 'block';
    document.getElementById('changeKeyBtn').classList.remove('hidden');

    showWelcome();
    document.getElementById('chatInput').focus();
  }

  function showWelcome() {
    const persona = PERSONAS[selectedPersona];
    const chatArea = document.getElementById('chatArea');

    const suggestions = persona.suggestions.map(s => `
      <button class="suggestion-btn" onclick="sendSuggestion('${s.text.replace(/\n/g, '\\n')}')">
        <span class="emoji">${s.emoji}</span>${s.text}
      </button>
    `).join('');

    chatArea.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo">${persona.emoji}</div>
        <h2>${persona.greeting}</h2>
        <p>질문하거나 아래 빠른 시작을 눌러보세요</p>
        <div class="suggestion-grid">${suggestions}</div>
      </div>
    `;
  }

  function sendSuggestion(text) {
    const input = document.getElementById('chatInput');
    input.value = text.replace(/\\n/g, '\n');
    autoResize(input);
    sendMessage();
  }

  function insertTemplate(text) {
    const input = document.getElementById('chatInput');
    input.value = text;
    input.focus();
    autoResize(input);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const chatArea = document.getElementById('chatArea');

    // Clear welcome if first message
    if (chatArea.querySelector('.welcome')) {
      chatArea.innerHTML = '';
    }

    // Add user message
    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    // Typing indicator
    const typingId = 'typing-' + Date.now();
    chatArea.insertAdjacentHTML('beforeend', `
      <div class="message ai" id="${typingId}">
        <div class="avatar ai">✦</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    `);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
      const persona = PERSONAS[selectedPersona];
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: persona.system,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      document.getElementById(typingId)?.remove();

      if (data.error) {
        appendMessage('ai', `❌ 오류: ${data.error.message}\n\nAPI 키를 확인해주세요.`);
      } else {
        const reply = data.content[0].text;
        appendMessage('ai', reply);
        conversationHistory.push({ role: 'assistant', content: reply });
      }

    } catch (err) {
      document.getElementById(typingId)?.remove();
      appendMessage('ai', '❌ 연결 오류가 발생했어요. 인터넷 연결과 API 키를 확인해주세요.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendMessage(role, text) {
    const chatArea = document.getElementById('chatArea');
    const emoji = role === 'user' ? '👤' : '✦';
    const avatarClass = role === 'user' ? 'user-av' : 'ai';

    chatArea.insertAdjacentHTML('beforeend', `
      <div class="message ${role}">
        <div class="avatar ${avatarClass}">${emoji}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      </div>
    `);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function resetKey() {
    apiKey = '';
    conversationHistory = [];
    document.getElementById('setupScreen').classList.remove('hidden');
    document.getElementById('chatArea').classList.add('hidden');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('statusDot').style.display = 'none';
    document.getElementById('statusText').style.display = 'none';
    document.getElementById('changeKeyBtn').classList.add('hidden');
    document.getElementById('apiKeyInput').value = '';
  }
</script>
</body>
</html>
